server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms

  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      routes:

        # ── Auth Service ───────────────────────────────────────────────────
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@rateLimitKeyResolver}"

        # ── URL Service ────────────────────────────────────────────────────
        - id: url-service
          uri: ${URL_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/urls/**
          filters:
            - name: CircuitBreaker
              args:
                name: url-cb
                fallbackUri: forward:/fallback
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@createRateLimiter}"
                key-resolver: "#{@rateLimitKeyResolver}"

        # ── Analytics Service ──────────────────────────────────────────────
        - id: analytics-service
          uri: ${ANALYTICS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - name: CircuitBreaker
              args:
                name: analytics-cb
                fallbackUri: forward:/fallback
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@createRateLimiter}"
                key-resolver: "#{@rateLimitKeyResolver}"

        # ── Tenant Service ─────────────────────────────────────────────────
        - id: tenant-service
          uri: ${TENANT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/tenants/**
          filters:
            - name: CircuitBreaker
              args:
                name: tenant-cb
                fallbackUri: forward:/fallback
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@createRateLimiter}"
                key-resolver: "#{@rateLimitKeyResolver}"

        # ── Redirect Service — short codes (hot path) ──────────────────────
        - id: redirect-service
          uri: ${REDIRECT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/{code:[A-Za-z0-9]+}
          filters:
            - name: CircuitBreaker
              args:
                name: redirect-cb
                fallbackUri: forward:/fallback
            - name: RequestRateLimiter
              args:
                rate-limiter: "#{@redirectRateLimiter}"
                key-resolver: "#{@rateLimitKeyResolver}"

        # ── Redirect info endpoint (public, no rate limit) ─────────────────
        - id: redirect-resolve
          uri: ${REDIRECT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/resolve/**

# ── Circuit breaker configuration ──────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      auth-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      url-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      redirect-cb:
        slidingWindowSize: 20
        failureRateThreshold: 60
        waitDurationInOpenState: 5s
      analytics-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      tenant-cb:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

# ── JWT RS256 public key ────────────────────────────────────────────────────
# Override JWT_RSA_PUBLIC_KEY env var in production (use Secrets Manager).
# Must match the private key configured in auth-service.
jwt:
  rsa:
    public-key: ${JWT_RSA_PUBLIC_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
