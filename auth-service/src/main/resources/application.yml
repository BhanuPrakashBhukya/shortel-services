server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shortel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:shortel}
    password: ${SPRING_DATASOURCE_PASSWORD:shortel_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms

jwt:
  # RSA-2048 private key (PKCS8, base64-encoded, no PEM headers).
  # Override JWT_RSA_PRIVATE_KEY env var in production (use Secrets Manager).
  rsa:
    private-key: ${JWT_RSA_PRIVATE_KEY:}
  access-token-ttl-minutes: ${JWT_ACCESS_TOKEN_TTL_MINUTES:15}
  refresh-token-ttl-days:   ${JWT_REFRESH_TOKEN_TTL_DAYS:7}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
