server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: redirect-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/shortel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:shortel}
    password: ${SPRING_DATASOURCE_PASSWORD:shortel_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 500ms      # Aggressive timeout — fast fail to DB on Redis issues
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 0   # Fire-and-forget — analytics failure must NEVER block redirect
    consumer:
      group-id: redirect-cache-invalidation
      auto-offset-reset: latest   # Only process future invalidation events; past ones are irrelevant on restart
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  cache:
    type: caffeine

# Short-lived redirect token issued after successful password verification (spec §8.5)
redirect:
  token:
    secret: ${REDIRECT_TOKEN_SECRET:ShortelRedirectTokenSecretKeyForDevelopmentOnlyMustChange}
    ttl-minutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
